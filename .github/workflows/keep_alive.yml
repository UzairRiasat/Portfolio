name: Keep Render Alive

on:
  schedule:
    # Runs every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Portfolio Website
        run: |
          curl --fail --silent --show-error https://uzair-portfolio-api.onrender.com/live
